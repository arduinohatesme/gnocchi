meta:
  engine: 4.1.0
# U is a predefined unit of measure that means 19.05mm, which is MX spacing (u is 19.00mm)
points:
  zones:
    matrix:
      anchor.shift: [50,-100] # Fix KiCad placement
      columns:
        xtra_pinky:
          rows:
            top:
              skip: true
        pinky.key.stagger: -0.2U
        ring.key.stagger: 0.8U
        middle.key.stagger: 0.25U
        index.key.stagger: -0.3U
        inner.key.stagger: -0.15U
      rows:
        bottom.padding: U
        home.padding: U
        top.padding: U
    thumb:
      anchor:
        ref: matrix_index_bottom
        shift: [1.6U, -1.8U]
      columns:
        tucky:
          key.splay: -20
          rows:
            top:
              key.name: thumb_tucky_high
            bottom:
              key.name: thumb_tucky_low
        middle:
          key.spread: U
          key.splay: -15
          key.origin: [-0.5U, -0.5U]
          rows:
            top:
              key.name: thumb_middle_high
            bottom:
              key.name: thumb_middle_low
        reachy:
          key.spread: U
          key.splay: -15
          key.origin: [-0.5U, -0.5U]
          rows:
            top:
              key.name: thumb_reachy_low
            bottom:
              skip: true
    hardware:
      anchor:
        ref: thumb_tucky_top
        shift: [-1.2U, 0]
        rotate: 20

  mirror:
    ref: matrix_pinky_home
    distance: 300

pcbs:
  gnocchi:
    template: kicad8
    footprints:
      keys:
        what: ceoloide/switch_mx
        where: true
        params:
          from: "{{column_net}}"
          to: "{{colrow}}"
          reversible: true
          solder: true
          include_keycap: true
      joystick:
        what: joystick
        where: hardware
        asym: left
        params:
          H1: GND
          H2: P020
          H3: VCC
          V1: GND
          V2: P022
          V3: VCC
          B1A: pos
          B2A: GND
          B1B: GND
          B2B: GND
          MOUN: GND
      wheel:
        what: evqwgd001
        where: hardware
        asym: right
        params:
          from: "{{column_net}}"
          to: "{{colrow}}"
          A: P029
          B: GND
          C: P031
          D: undef
      mcu:
        what: ceoloide/mcu_nice_nano
        where:
          - ref: matrix_inner_home
            shift: [1U, 0.5U]
        params:
          reversible: true
          only_required_jumpers: true
          rows: [ P031, P029, P002, P115 ]
          columns: [ P113, P111, P010, P009, P106 ]
